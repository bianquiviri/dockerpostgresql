# CONFIGURACIÓN OPTIMIZADA POR ANTIGRAVITY
listen_addresses = '*'

# --- Memory & Performance ---
shared_buffers = 1GB               # 25% of 4GB RAM typical for dev
effective_cache_size = 3GB         # 75% of 4GB RAM
work_mem = 32MB                    # Increased for large sorts
maintenance_work_mem = 256MB
huge_pages = off

# --- Parallelism (from optimize.sh) ---
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4
enable_partition_pruning = on
enable_parallel_append = on
enable_parallel_hash = on
enable_partitionwise_join = on
enable_partitionwise_aggregate = on

# --- Disk & I/O ---
effective_io_concurrency = 200     # Assuming SSD
random_page_cost = 1.1             # SSD cost
min_wal_size = 1GB
max_wal_size = 4GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# --- Connections & Security ---
max_connections = 100              # Balanced for performance
shared_preload_libraries = 'pg_stat_statements'

# --- Autovacuum Tuning ---
autovacuum_max_workers = 4
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# --- Monitoring ---
pg_stat_statements.track = all
log_min_duration_statement = 1000
log_temp_files = 0
log_checkpoints = on
log_lock_waits = on
